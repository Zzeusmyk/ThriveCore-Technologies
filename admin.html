<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | ThriveCore Technologies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --blue-900: #0f2341;
      --blue-700: #1a4080;
      --blue-600: #1e4f9f;
      --blue-500: #2563b8;
      --blue-50: #e8f1fa;
      --orange: #f28c28;
      --red: #e04e3e;
      --green: #34d399;
      --white: #ffffff;
      --gray-50: #f8f9fb;
      --gray-100: #f0f2f5;
      --gray-200: #e2e5ea;
      --gray-400: #9aa1ad;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--gray-50);
      color: var(--gray-700);
      line-height: 1.6;
    }
    .admin-header {
      background: var(--blue-900);
      color: var(--white);
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .admin-header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
    }
    .admin-header h1 span { color: var(--orange); }
    .admin-header a {
      color: var(--blue-50);
      text-decoration: none;
      font-size: 0.88rem;
      padding: 8px 20px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      transition: all 0.2s;
    }
    .admin-header a:hover { background: rgba(255,255,255,0.1); }
    .admin-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    /* Stats Cards */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--white);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid var(--gray-200);
    }
    .stat-card .label {
      font-size: 0.82rem;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-family: 'Poppins', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--blue-900);
    }
    .stat-card.orange .value { color: var(--orange); }
    .stat-card.green .value { color: var(--green); }
    /* Table */
    .submissions-card {
      background: var(--white);
      border-radius: 16px;
      border: 1px solid var(--gray-200);
      overflow: hidden;
    }
    .submissions-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .submissions-header h2 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.1rem;
      color: var(--blue-900);
    }
    .refresh-btn {
      padding: 8px 20px;
      background: var(--blue-600);
      color: var(--white);
      border: none;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .refresh-btn:hover { background: var(--blue-700); }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      text-align: left;
      padding: 12px 20px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: 1px;
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-200);
    }
    td {
      padding: 14px 20px;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--gray-100);
      color: var(--gray-600);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    tr:hover td { background: var(--blue-50); }
    tr.unread td { font-weight: 600; color: var(--gray-700); }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 50px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-new {
      background: rgba(242,140,40,0.1);
      color: var(--orange);
    }
    .badge-read {
      background: var(--gray-100);
      color: var(--gray-400);
    }
    .delete-btn {
      background: none;
      border: none;
      color: var(--red);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 4px 10px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .delete-btn:hover { background: rgba(224,78,62,0.1); }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray-400);
    }
    .empty-state p { font-size: 1rem; }
    /* Detail Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--white);
      border-radius: 20px;
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 32px;
    }
    .modal h3 {
      font-family: 'Poppins', sans-serif;
      color: var(--blue-900);
      margin-bottom: 20px;
      font-size: 1.2rem;
    }
    .modal-field {
      margin-bottom: 16px;
    }
    .modal-field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .modal-field p {
      font-size: 0.95rem;
      color: var(--gray-700);
    }
    .modal-field.message p {
      background: var(--gray-50);
      padding: 14px;
      border-radius: 10px;
      border: 1px solid var(--gray-200);
      white-space: pre-wrap;
      line-height: 1.7;
    }
    .modal-close {
      margin-top: 20px;
      padding: 10px 28px;
      background: var(--gray-200);
      color: var(--gray-700);
      border: none;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .modal-close:hover { background: var(--gray-300); }
    @media (max-width: 768px) {
      .stats-row { grid-template-columns: 1fr; }
      th:nth-child(4), td:nth-child(4),
      th:nth-child(5), td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

  <header class="admin-header">
    <h1>Thrive<span>Core</span> Admin</h1>
    <a href="/">Back to Website</a>
  </header>

  <div class="admin-container">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="label">Total Submissions</div>
        <div class="value" id="statTotal">--</div>
      </div>
      <div class="stat-card orange">
        <div class="label">Unread</div>
        <div class="value" id="statUnread">--</div>
      </div>
      <div class="stat-card green">
        <div class="label">Today</div>
        <div class="value" id="statToday">--</div>
      </div>
    </div>

    <!-- Submissions Table -->
    <div class="submissions-card">
      <div class="submissions-header">
        <h2>Contact Submissions</h2>
        <button class="refresh-btn" onclick="loadData()">Refresh</button>
      </div>
      <div id="tableContainer">
        <div class="empty-state"><p>Loading...</p></div>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3>Submission Details</h3>
      <div id="modalContent"></div>
      <button class="modal-close" onclick="closeModal()">Close</button>
    </div>
  </div>

  <script>
    const API = '/api';

    async function loadData() {
      await Promise.all([loadStats(), loadSubmissions()]);
    }

    async function loadStats() {
      try {
        const res = await fetch(`${API}/stats`);
        const data = await res.json();
        document.getElementById('statTotal').textContent = data.total;
        document.getElementById('statUnread').textContent = data.unread;
        document.getElementById('statToday').textContent = data.today;
      } catch (e) {
        console.error('Failed to load stats:', e);
      }
    }

    async function loadSubmissions() {
      const container = document.getElementById('tableContainer');
      try {
        const res = await fetch(`${API}/submissions`);
        const data = await res.json();

        if (!data.data || data.data.length === 0) {
          container.innerHTML = '<div class="empty-state"><p>No submissions yet. They will appear here when someone fills out the contact form.</p></div>';
          return;
        }

        let html = `<table>
          <thead><tr>
            <th>Status</th><th>Name</th><th>Email</th><th>Service</th><th>Date</th><th>Actions</th>
          </tr></thead><tbody>`;

        data.data.forEach(s => {
          const date = new Date(s.submitted_at + 'Z').toLocaleDateString('en-NG', {
            day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
          });
          const badge = s.is_read
            ? '<span class="badge badge-read">Read</span>'
            : '<span class="badge badge-new">New</span>';
          const rowClass = s.is_read ? '' : 'unread';

          html += `<tr class="${rowClass}">
            <td>${badge}</td>
            <td>${esc(s.first_name)} ${esc(s.last_name)}</td>
            <td>${esc(s.email)}</td>
            <td>${esc(s.service || '—')}</td>
            <td>${date}</td>
            <td>
              <button class="delete-btn" onclick="viewSubmission(${s.id})" style="color:var(--blue-600)">View</button>
              <button class="delete-btn" onclick="deleteSubmission(${s.id})">Delete</button>
            </td>
          </tr>`;
        });

        html += '</tbody></table>';
        container.innerHTML = html;
      } catch (e) {
        container.innerHTML = '<div class="empty-state"><p>Failed to load submissions. Is the server running?</p></div>';
      }
    }

    async function viewSubmission(id) {
      try {
        const res = await fetch(`${API}/submissions/${id}`);
        const data = await res.json();
        const s = data.data;
        const date = new Date(s.submitted_at + 'Z').toLocaleDateString('en-NG', {
          weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });

        document.getElementById('modalContent').innerHTML = `
          <div class="modal-field"><label>Name</label><p>${esc(s.first_name)} ${esc(s.last_name)}</p></div>
          <div class="modal-field"><label>Email</label><p>${esc(s.email)}</p></div>
          <div class="modal-field"><label>Phone</label><p>${esc(s.phone || 'Not provided')}</p></div>
          <div class="modal-field"><label>Company</label><p>${esc(s.company || 'Not provided')}</p></div>
          <div class="modal-field"><label>Service Interest</label><p>${esc(s.service || 'Not specified')}</p></div>
          <div class="modal-field"><label>Submitted</label><p>${date}</p></div>
          <div class="modal-field message"><label>Message</label><p>${esc(s.message)}</p></div>
        `;

        document.getElementById('modal').classList.add('active');
        loadStats(); // refresh unread count
      } catch (e) {
        alert('Failed to load submission details.');
      }
    }

    async function deleteSubmission(id) {
      if (!confirm('Are you sure you want to delete this submission?')) return;
      try {
        await fetch(`${API}/submissions/${id}`, { method: 'DELETE' });
        loadData();
      } catch (e) {
        alert('Failed to delete.');
      }
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      loadSubmissions();
    }

    function esc(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Close modal on overlay click
    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // Load on page ready
    loadData();
  </script>
</body>
</html>
